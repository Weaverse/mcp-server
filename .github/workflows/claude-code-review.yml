name: OpenClaw Review

# Manual / on-demand review: comment `/code-review` on a PR to run it. It does
# not review every push. issue_comment is used (not workflow_dispatch or
# pull_request:labeled) because the action only posts a review when
# track_progress is allowed for the event — and issue_comment is. These runs
# always use the workflow from the default branch, so any open PR works.
on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    # Only PR comments (not issue comments) that explicitly ask for a review.
    if: ${{ github.event.issue.pull_request && contains(github.event.comment.body, '/code-review') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run OpenClaw Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number }}'
